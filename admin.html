<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Assessment Agile</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f1117; --ink-muted: #5a5f72; --ink-faint: #9198aa;
    --surface: #fafaf8; --surface-2: #f2f1ed; --surface-3: #e8e7e1;
    --accent: #1a4fd6; --accent-light: #dce6ff; --accent-dark: #0f35a0;
    --green: #0d7a52; --green-light: #d4f0e5;
    --amber: #a05c0a; --amber-light: #fdefd6;
    --red: #c0282a; --red-light: #fce8e8;
    --border: #dddbd4; --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--ink); min-height: 100vh; font-size: 16px; line-height: 1.6; }
  .shell { max-width: 720px; margin: 0 auto; padding: 0 20px 80px; }
  .header { padding: 48px 0 40px; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
  .header-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
  .header h1 { font-family: 'DM Serif Display', serif; font-size: clamp(24px, 4vw, 36px); line-height: 1.1; margin-bottom: 8px; }
  .header p { font-size: 15px; color: var(--ink-muted); }

  /* Login */
  .login-card { background: white; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 32px; max-width: 360px; }
  .login-card h2 { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 6px; }
  .login-card p { font-size: 14px; color: var(--ink-muted); margin-bottom: 24px; }
  .login-error { font-size: 13px; color: var(--red); margin-top: 8px; }

  /* Form */
  .field-group { margin-bottom: 16px; }
  .field-group label { font-size: 14px; font-weight: 500; color: var(--ink); display: block; margin-bottom: 6px; }
  .field-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: 'DM Sans', sans-serif; background: white; color: var(--ink); outline: none; transition: border-color 0.15s; }
  .field-input:focus { border-color: var(--accent); }

  /* Buttons */
  .btn { padding: 11px 22px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: white; color: var(--ink); font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .btn:hover { background: var(--surface-2); border-color: var(--ink-faint); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
  .btn.sm { padding: 6px 14px; font-size: 12px; }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: var(--red-light); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Section */
  .section-title { font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 16px; }
  .section-card { background: white; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }

  /* Add team form */
  .add-row { display: flex; gap: 10px; align-items: flex-end; }
  .add-row .field-group { flex: 1; margin-bottom: 0; }

  /* Teams table */
  .team-list { display: flex; flex-direction: column; gap: 10px; }
  .team-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); }
  .team-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--ink); }
  .team-count { font-size: 12px; color: var(--ink-faint); background: var(--surface-2); border: 1px solid var(--border); padding: 2px 10px; border-radius: 99px; }
  .badge-active { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px; background: var(--green-light); color: var(--green); }
  .badge-inactive { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px; background: var(--surface-3); color: var(--ink-faint); }
  .team-actions { display: flex; gap: 6px; }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  @media(max-width:500px){ .stats-row { grid-template-columns: 1fr 1fr; } }
  .stat-card { background: white; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 16px 18px; }
  .stat-num { font-size: 28px; font-weight: 600; color: var(--ink); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--ink-faint); }

  .empty-state { text-align: center; padding: 32px; color: var(--ink-faint); font-size: 14px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: white; font-size: 13px; padding: 10px 18px; border-radius: var(--radius-sm); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .fade-in { animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-eyebrow">Panel de Administración</div>
    <h1>Assessment Agile</h1>
    <p>Gestión de equipos y seguimiento de respuestas</p>
  </div>
  <div id="app"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── Config ───────────────────────────────────────────────────────
const ADMIN_PASS     = 'AgileAdmin';   // ← cambia esta contraseña
const AIRTABLE_TOKEN = 'patnH2ZIhl6grBT0N.57316def615cb34f5596a2733b3a5ff248c4e6af0d0e4dff2e2a5ed0a8f73711';
const AIRTABLE_BASE  = 'appVwaCg5q6Ab6CWV';
const TABLE_EQUIPOS    = 'tbl1pq6BuPfillhP7';
const TABLE_RESPUESTAS = 'tbl8WjOti7jmRqS12';
// ────────────────────────────────────────────────────────────────

let authenticated = sessionStorage.getItem('adminAuth') === 'true';
let teams = [];
let totalResponses = 0;
let loading = false;
let newTeamName = '';

// ── API helpers ──────────────────────────────────────────────────
function headers() {
  return { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' };
}

async function fetchTeams() {
  loading = true; render();
  try {
    const url = `https://api.airtable.com/v0/${AIRTABLE_BASE}/${TABLE_EQUIPOS}`
      + `?sort[0][field]=Nombre&sort[0][direction]=asc`;
    const res = await fetch(url, { headers: headers() });
    const data = await res.json();
    teams = (data.records || []).map(r => ({
      id: r.id,
      name: r.fields.Nombre || '',
      active: r.fields.Activo || false,
      responses: r.fields.Respuestas ? r.fields.Respuestas.length : 0
    }));
    totalResponses = teams.reduce((a, t) => a + t.responses, 0);
  } catch(e) {
    toast('Error al conectar con Airtable');
  }
  loading = false; render();
}

async function addTeam() {
  const name = newTeamName.trim();
  if (!name) return;
  try {
    const res = await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE}/${TABLE_EQUIPOS}`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ fields: { Nombre: name, Activo: true } })
    });
    if (res.ok) {
      newTeamName = '';
      toast(`Equipo "${name}" creado`);
      await fetchTeams();
    } else { toast('Error al crear equipo'); }
  } catch(e) { toast('Error de conexión'); }
}

async function toggleActive(team) {
  try {
    const res = await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE}/${TABLE_EQUIPOS}/${team.id}`, {
      method: 'PATCH',
      headers: headers(),
      body: JSON.stringify({ fields: { Activo: !team.active } })
    });
    if (res.ok) {
      toast(team.active ? `"${team.name}" desactivado` : `"${team.name}" activado`);
      await fetchTeams();
    } else { toast('Error al actualizar'); }
  } catch(e) { toast('Error de conexión'); }
}

async function deleteTeam(team) {
  if (!confirm(`¿Eliminar el equipo "${team.name}"? Esta acción no se puede deshacer.`)) return;
  try {
    const res = await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE}/${TABLE_EQUIPOS}/${team.id}`, {
      method: 'DELETE', headers: headers()
    });
    if (res.ok) { toast(`"${team.name}" eliminado`); await fetchTeams(); }
    else { toast('Error al eliminar'); }
  } catch(e) { toast('Error de conexión'); }
}

// ── UI ───────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

function login() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PASS) {
    authenticated = true;
    sessionStorage.setItem('adminAuth', 'true');
    render();
    fetchTeams();
  } else {
    document.getElementById('loginError').textContent = 'Contraseña incorrecta';
  }
}

function logout() {
  authenticated = false;
  sessionStorage.removeItem('adminAuth');
  teams = []; render();
}

function render() {
  const app = document.getElementById('app');
  if (!authenticated) { app.innerHTML = renderLogin(); return; }
  app.innerHTML = renderAdmin();
  app.classList.remove('fade-in');
  void app.offsetWidth;
  app.classList.add('fade-in');
}

function renderLogin() {
  return `
    <div class="login-card fade-in">
      <h2>Acceso restringido</h2>
      <p>Ingresa la contraseña de administrador para continuar.</p>
      <div class="field-group">
        <label>Contraseña</label>
        <input class="field-input" type="password" id="pwInput" placeholder="••••••••"
          onkeydown="if(event.key==='Enter')login()"/>
      </div>
      <div id="loginError" class="login-error"></div>
      <div style="margin-top:16px;">
        <button class="btn primary" onclick="login()">Ingresar →</button>
      </div>
    </div>`;
}

function renderAdmin() {
  const activeCount = teams.filter(t => t.active).length;

  const statsHtml = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${teams.length}</div><div class="stat-label">Equipos total</div></div>
      <div class="stat-card"><div class="stat-num">${activeCount}</div><div class="stat-label">Equipos activos</div></div>
      <div class="stat-card"><div class="stat-num">${totalResponses}</div><div class="stat-label">Respuestas totales</div></div>
    </div>`;

  const addFormHtml = `
    <div class="section-card">
      <div class="section-title">Agregar equipo</div>
      <div class="add-row">
        <div class="field-group">
          <label>Nombre del equipo</label>
          <input class="field-input" type="text" id="newTeamInput" placeholder="Ej. Equipo Phoenix"
            value="${newTeamName}"
            oninput="newTeamName=this.value"
            onkeydown="if(event.key==='Enter')addTeam()"/>
        </div>
        <button class="btn primary" onclick="addTeam()" style="flex-shrink:0;margin-bottom:1px;">Agregar</button>
      </div>
    </div>`;

  const teamsHtml = loading
    ? `<div class="empty-state">Cargando equipos…</div>`
    : teams.length === 0
      ? `<div class="empty-state">No hay equipos aún. Agrega el primero.</div>`
      : `<div class="team-list">
          ${teams.map(t => `
            <div class="team-row">
              <div class="team-name">${t.name}</div>
              <span class="team-count">${t.responses} respuesta${t.responses !== 1 ? 's' : ''}</span>
              <span class="${t.active ? 'badge-active' : 'badge-inactive'}">${t.active ? 'Activo' : 'Inactivo'}</span>
              <div class="team-actions">
                <button class="btn sm" onclick="toggleActive(teams.find(x=>x.id==='${t.id}'))"
                  title="${t.active ? 'Desactivar' : 'Activar'}">
                  ${t.active ? 'Desactivar' : 'Activar'}
                </button>
                <button class="btn sm danger" onclick="deleteTeam(teams.find(x=>x.id==='${t.id}'))"
                  title="Eliminar">✕</button>
              </div>
            </div>`).join('')}
        </div>`;

  return `
    ${statsHtml}
    ${addFormHtml}
    <div class="section-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="section-title" style="margin-bottom:0;">Equipos</div>
        <div style="display:flex;gap:8px;">
          <button class="btn sm" onclick="fetchTeams()">Actualizar</button>
          <a href="https://airtable.com/${AIRTABLE_BASE}" target="_blank" class="btn sm">Ver en Airtable ↗</a>
          <button class="btn sm danger" onclick="logout()">Cerrar sesión</button>
        </div>
      </div>
      ${teamsHtml}
    </div>`;
}

// ── Init ─────────────────────────────────────────────────────────
render();
if (authenticated) fetchTeams();
</script>
</body>
</html>
