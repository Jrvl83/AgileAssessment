<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Assessment Agile</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f1117; --ink-muted: #5a5f72; --ink-faint: #9198aa;
    --surface: #fafaf8; --surface-2: #f2f1ed; --surface-3: #e8e7e1;
    --accent: #1a4fd6; --accent-light: #dce6ff; --accent-dark: #0f35a0;
    --green: #0d7a52; --green-light: #d4f0e5;
    --amber: #a05c0a; --amber-light: #fdefd6;
    --red: #c0282a; --red-light: #fce8e8;
    --purple: #7c3aed; --purple-light: #ede9fe;
    --border: #dddbd4; --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--ink); min-height: 100vh; font-size: 16px; line-height: 1.6; }
  .shell { max-width: 860px; margin: 0 auto; padding: 0 20px 80px; }

  .header { padding: 48px 0 32px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
  .header-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
  .header h1 { font-family: 'DM Serif Display', serif; font-size: clamp(24px, 4vw, 36px); line-height: 1.1; margin-bottom: 8px; }
  .header p { font-size: 15px; color: var(--ink-muted); }

  /* Tabs */
  .tab-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; border-bottom: 2px solid var(--border); }
  .tabs { display: flex; gap: 4px; }
  .tab { padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--ink-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-actions { display: flex; gap: 8px; padding-bottom: 8px; }

  /* Login */
  .login-card { background: white; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 32px; max-width: 360px; }
  .login-card h2 { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 6px; }
  .login-card p { font-size: 14px; color: var(--ink-muted); margin-bottom: 24px; }
  .login-error { font-size: 13px; color: var(--red); margin-top: 8px; }

  /* Form */
  .field-group { margin-bottom: 16px; }
  .field-group label { font-size: 14px; font-weight: 500; color: var(--ink); display: block; margin-bottom: 6px; }
  .field-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: 'DM Sans', sans-serif; background: white; color: var(--ink); outline: none; transition: border-color 0.15s; }
  .field-input:focus { border-color: var(--accent); }

  /* Buttons */
  .btn { padding: 11px 22px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: white; color: var(--ink); font-family: 'DM Sans', sans-serif; transition: all 0.15s; text-decoration: none; display: inline-block; }
  .btn:hover { background: var(--surface-2); border-color: var(--ink-faint); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
  .btn.sm { padding: 6px 14px; font-size: 12px; }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: var(--red-light); }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  @media(max-width:600px){ .stats-row { grid-template-columns: 1fr 1fr; } }
  .stat-card { background: white; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 16px 18px; }
  .stat-num { font-size: 28px; font-weight: 600; color: var(--ink); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--ink-faint); }

  /* Section */
  .section-card { background: white; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
  .section-title { font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 16px; }

  /* Comparativo */
  .org-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .org-row:last-child { border-bottom: none; }
  .org-name { width: 170px; font-size: 13px; font-weight: 500; color: var(--ink); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .org-bar-wrap { flex: 1; height: 8px; background: var(--surface-2); border-radius: 99px; overflow: hidden; }
  .org-bar { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .org-pct { font-size: 13px; font-weight: 600; color: var(--ink); width: 42px; text-align: right; flex-shrink: 0; }
  .org-badge { font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 99px; flex-shrink: 0; }

  /* Team cards */
  .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:600px){ .team-grid { grid-template-columns: 1fr; } }
  .tac { background: white; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .tac-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
  .tac-name { font-size: 15px; font-weight: 600; color: var(--ink); }
  .tac-meta { font-size: 12px; color: var(--ink-faint); margin-top: 2px; }
  .tac-score { text-align: right; flex-shrink: 0; margin-left: 12px; }
  .tac-score-num { font-size: 26px; font-weight: 600; line-height: 1; }
  .tac-level { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; margin-top: 4px; display: inline-block; }
  .dim-row { margin-bottom: 10px; }
  .dim-row-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .dim-label { font-size: 12px; color: var(--ink-muted); }
  .dim-pct-label { font-size: 12px; font-weight: 600; color: var(--ink); }
  .dim-bar-wrap { height: 4px; background: var(--surface-2); border-radius: 99px; overflow: hidden; }
  .dim-bar { height: 100%; border-radius: 99px; }
  .recs-section { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
  .recs-label { font-size: 11px; font-weight: 600; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .rec-role-note { font-size: 10px; font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--ink-faint); }
  .rec-item { display: flex; gap: 8px; margin-bottom: 7px; }
  .rec-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .rec-text { font-size: 12px; color: var(--ink-muted); line-height: 1.5; }
  .rec-context { font-size: 11px; color: var(--amber); margin-top: 3px; font-style: italic; }
  .pattern-block { margin-bottom: 10px; padding: 9px 12px; border-radius: var(--radius-sm); border-left: 3px solid; }
  .pattern-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
  .pattern-text { font-size: 11px; line-height: 1.5; }
  .rec-item--urgent { border-left: 3px solid var(--red); padding-left: 8px; border-radius: 2px; background: var(--red-light, #fce8e8); }
  .rec-item--improving { border-left: 3px solid #0d7a52; padding-left: 8px; border-radius: 2px; background: #d4f0e5; }
  .rec-trend { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
  .badge-critical { display:inline-block; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; padding:1px 7px; border-radius:99px; background:var(--red-light,#fce8e8); color:var(--red,#c0282a); border:1px solid var(--red,#c0282a); margin-right:6px; vertical-align:middle; }

  /* Role filter */
  .role-filter { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--border); }
  .role-pill { padding:3px 10px; font-size:11px; font-weight:600; border-radius:99px; cursor:pointer; border:1.5px solid var(--border); background:white; color:var(--ink-muted); font-family:'DM Sans',sans-serif; transition:all 0.15s; }
  .role-pill:hover { border-color:var(--ink-faint); color:var(--ink); }
  .role-pill.active { background:var(--accent-light); border-color:var(--accent); color:var(--accent-dark); }

  /* Teams mgmt */
  .add-row { display: flex; gap: 10px; align-items: flex-end; }
  .add-row .field-group { flex: 1; margin-bottom: 0; }
  .team-list { display: flex; flex-direction: column; gap: 10px; }
  .team-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); }
  .team-row-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--ink); }
  .team-count-badge { font-size: 12px; color: var(--ink-faint); background: var(--surface-2); border: 1px solid var(--border); padding: 2px 10px; border-radius: 99px; }
  .badge-on  { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px; background: var(--green-light); color: var(--green); }
  .badge-off { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px; background: var(--surface-3); color: var(--ink-faint); }

  .empty-state { text-align: center; padding: 48px 0; color: var(--ink-faint); font-size: 14px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: white; font-size: 13px; padding: 10px 18px; border-radius: var(--radius-sm); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
  .fade-in { animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* Evolution */
  .evo-timeline { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; margin-bottom:20px; }
  .evo-cycle-card { flex:1; min-width:110px; border-radius:var(--radius-sm); padding:12px 14px; }
  .evo-cycle-name { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; }
  .evo-cycle-score { font-size:22px; font-weight:600; line-height:1; }
  .evo-cycle-meta { font-size:11px; margin-top:2px; }
  .evo-table { width:100%; border-collapse:collapse; font-size:12px; }
  .evo-th { text-align:left; padding:8px 10px 8px 0; color:var(--ink-faint); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; border-bottom:1.5px solid var(--border); }
  .evo-th-c { padding:8px 10px; color:var(--ink-muted); font-weight:600; font-size:11px; text-align:center; border-bottom:1.5px solid var(--border); white-space:nowrap; }
  .evo-td-dim { padding:10px 10px 10px 0; color:var(--ink); font-weight:500; border-bottom:1px solid var(--border); white-space:nowrap; }
  .evo-td { padding:8px 10px; text-align:center; border-bottom:1px solid var(--border); vertical-align:middle; }
  .evo-bar-wrap { height:4px; background:var(--surface-2); border-radius:99px; overflow:hidden; width:72px; margin:0 auto 4px; }
  .evo-bar { height:100%; border-radius:99px; }
  .delta-up { color:var(--green); font-size:11px; font-weight:600; }
  .delta-dn { color:var(--red); font-size:11px; font-weight:600; }
  .delta-eq { color:var(--ink-faint); font-size:11px; }
  .no-print {}

  /* Cycles management */
  .cycle-row { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius-sm); }
  .cycle-row-name { flex:1; font-size:14px; font-weight:500; color:var(--ink); }
  .badge-active { font-size:11px; font-weight:600; padding:3px 10px; border-radius:99px; background:var(--green-light); color:var(--green); }
  .badge-inactive { font-size:11px; font-weight:600; padding:3px 10px; border-radius:99px; background:var(--surface-3); color:var(--ink-faint); }

  /* Plan de Acción */
  .plan-state-badge { font-size:11px; font-weight:600; padding:3px 10px; border-radius:99px; flex-shrink:0; }

  /* Print */
  @media print {
    .tab-bar, .toast, .no-print, .role-filter { display:none !important; }
    .btn { display:none !important; }
    .shell { max-width:100%; padding:0 16px; }
    .team-grid { grid-template-columns:1fr 1fr; }
    .section-card, .tac { break-inside:avoid; page-break-inside:avoid; }
    body { background:white; font-size:11px; }
    .stat-num { font-size:20px !important; }
    .header { padding:20px 0 16px; }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-eyebrow">Panel de Administración</div>
    <h1>Assessment Agile</h1>
    <p>Análisis comparativo de madurez por equipo</p>
  </div>
  <div id="app"></div>
</div>
<div class="toast" id="toast"></div>
<div id="qr-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="assessment-config.js"></script>
<script>
// ── Config ───────────────────────────────────────────────────────
const ADMIN_PASS = 'AgileAdmin';   // ← cambia esta contraseña
const firebaseConfig = {
  apiKey: "AIzaSyDcsMNbGqwmkbgg3k41dPfKCEgWMnX0SaM",
  authDomain: "agile-assessment-5a117.firebaseapp.com",
  projectId: "agile-assessment-5a117",
  storageBucket: "agile-assessment-5a117.firebasestorage.app",
  messagingSenderId: "41571782884",
  appId: "1:41571782884:web:e8b96178aeffc4649edcf1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LEVELS, DIMS, RECS, RECS_ROLE, getLevel, getRec → assessment-config.js


// ── State ────────────────────────────────────────────────────────
let authenticated = sessionStorage.getItem('adminAuth') === 'true';
let activeTab = 'analysis';
let teams = [];
let responses = [];
let teamStats = {};
let loading = false;
let newTeamName = '';
let teamRoleFilter = {};
let orgRoleFilter = 'Todos';
let cycles = [];
let cycleFilter = 'Todos';
let evolTeamId = '';
let evolRole = 'Todos';
let newCycleName = '';
let plans = [];
let newPlanTeamId = '';
let newPlanIniciativa = '';
let newPlanResponsable = '';
let newPlanFecha = '';
let newPlanCiclo = '';
let planTeamFilter = 'Todos';
let planCycleFilter = 'Todos';

// ── Helpers ──────────────────────────────────────────────────────

function calcDispersion(pctArr) {
  if (pctArr.length < 2) return null;
  const mean = pctArr.reduce((a,b) => a+b, 0) / pctArr.length;
  const sd = Math.round(Math.sqrt(pctArr.reduce((a,b) => a + Math.pow(b-mean, 2), 0) / pctArr.length));
  const min = Math.min(...pctArr);
  const max = Math.max(...pctArr);
  const align = sd < 15 ? { label:'Alta',  color:'#0d7a52', bg:'#d4f0e5' }
              : sd < 25 ? { label:'Media', color:'#a05c0a', bg:'#fdefd6' }
              :            { label:'Baja',  color:'#c0282a', bg:'#fce8e8' };
  return { sd, min, max, align };
}

function getMajorityRole(resps) {
  const counts = {};
  resps.forEach(r => {
    const rol = r.fields.Rol;
    if (rol && rol !== 'Otro') counts[rol] = (counts[rol] || 0) + 1;
  });
  const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  if (!entries.length || entries.length > 1 && entries[0][1] === entries[1][1]) return null;
  return entries[0][0];
}

function getTeamFilteredStats(tid, roleFilter, cFilter) {
  const cf = cFilter || 'Todos';
  const filtered = responses.filter(r =>
    (r.fields.Equipo || []).includes(tid) &&
    (roleFilter === 'Todos' || r.fields.Rol === roleFilter) &&
    (cf === 'Todos' || r.fields.Ciclo === cf)
  );
  if (!filtered.length) return null;
  const dimSums = {};
  DIMS.forEach(d => { dimSums[d.key] = 0; });
  let totalPct = 0;
  filtered.forEach(r => {
    DIMS.forEach(d => { dimSums[d.key] += r.fields[d.field] || 0; });
    totalPct += r.fields['Score Total %'] || 0;
  });
  const avgTotal = Math.round(totalPct / filtered.length);
  const avgDims = {};
  DIMS.forEach(d => {
    const avg = dimSums[d.key] / filtered.length;
    avgDims[d.key] = { score: +avg.toFixed(1), pct: Math.round((avg / d.max) * 100) };
  });
  const dispersion = {};
  DIMS.forEach(d => {
    const pcts = filtered.map(r => Math.round(((r.fields[d.field] || 0) / d.max) * 100));
    dispersion[d.key] = calcDispersion(pcts);
  });
  dispersion.overall = calcDispersion(filtered.map(r => r.fields['Score Total %'] || 0));
  const tamanoCount = {}, scrumTimeCount = {};
  filtered.forEach(r => {
    const t = r.fields['Tamaño Equipo'], s = r.fields['Tiempo Scrum'];
    if (t) tamanoCount[t] = (tamanoCount[t] || 0) + 1;
    if (s) scrumTimeCount[s] = (scrumTimeCount[s] || 0) + 1;
  });
  const tamano = Object.entries(tamanoCount).sort((a, b) => b[1] - a[1])[0]?.[0] || null;
  const tiempoScrum = Object.entries(scrumTimeCount).sort((a, b) => b[1] - a[1])[0]?.[0] || null;
  return { count: filtered.length, avgTotal, avgDims, level: getLevel(avgTotal), dispersion, tamano, tiempoScrum };
}

function computeStats() {
  const stats = {};
  teams.forEach(t => {
    stats[t.id] = { id: t.id, name: t.name, active: t.active, count: 0, dimSums: {}, totalPct: 0 };
    DIMS.forEach(d => { stats[t.id].dimSums[d.key] = 0; });
  });

  responses.forEach(r => {
    (r.fields.Equipo || []).forEach(tid => {
      if (!stats[tid]) return;
      const s = stats[tid];
      s.count++;
      DIMS.forEach(d => { s.dimSums[d.key] += r.fields[d.field] || 0; });
      s.totalPct += r.fields['Score Total %'] || 0;
    });
  });

  Object.values(stats).forEach(s => {
    if (s.count > 0) {
      s.avgTotal = Math.round(s.totalPct / s.count);
      s.avgDims = {};
      DIMS.forEach(d => {
        const avg = s.dimSums[d.key] / s.count;
        s.avgDims[d.key] = { score: +avg.toFixed(1), pct: Math.round((avg / d.max) * 100) };
      });
      s.level = getLevel(s.avgTotal);
    }
  });
  teamStats = stats;
}

// ── Cycle management ─────────────────────────────────────────────
async function addCycle() {
  const name = newCycleName.trim();
  if (!name) return;
  try {
    await db.collection('ciclos').add({ nombre: name, activo: false });
    newCycleName = '';
    toast(`Ciclo "${name}" creado`);
    await fetchAllData();
  } catch(e) { toast('Error al crear ciclo'); }
}

async function toggleCycle(id, name, current) {
  try {
    if (!current) {
      const batch = db.batch();
      cycles.filter(c => c.active && c.id !== id).forEach(c => {
        batch.update(db.collection('ciclos').doc(c.id), { activo: false });
      });
      await batch.commit();
    }
    await db.collection('ciclos').doc(id).update({ activo: !current });
    toast(current ? `"${name}" cerrado` : `"${name}" activado`);
    await fetchAllData();
  } catch(e) { toast('Error de conexión'); }
}

async function deleteCycle(id, name) {
  if (!confirm(`¿Eliminar ciclo "${name}"? Las respuestas asociadas no se borrarán.`)) return;
  try {
    await db.collection('ciclos').doc(id).delete();
    toast(`Ciclo "${name}" eliminado`);
    await fetchAllData();
  } catch(e) { toast('Error de conexión'); }
}

// ── Export ───────────────────────────────────────────────────────
function downloadCSV(filename, rows) {
  const csv = 'sep=;\r\n' + '\uFEFF' + rows.map(r =>
    r.map(cell => '"' + String(cell == null ? '' : cell).replace(/"/g, '""') + '"').join(';')
  ).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function exportSummary() {
  const headers = ['Equipo', 'Ciclo', 'Rol', 'Respuestas', 'Score Total %', 'Nivel',
    ...DIMS.map(d => d.label + ' %')];
  const rows = [headers];
  Object.values(teamStats).filter(s => s.count > 0).forEach(s => {
    const ds = getTeamFilteredStats(s.id, orgRoleFilter, cycleFilter);
    if (!ds) return;
    rows.push([s.name, cycleFilter === 'Todos' ? 'Todos' : cycleFilter,
      orgRoleFilter, ds.count, ds.avgTotal, ds.level.label,
      ...DIMS.map(d => ds.avgDims[d.key].pct)]);
  });
  downloadCSV(`resumen-assessment-${new Date().toISOString().slice(0,10)}.csv`, rows);
}

function exportRaw() {
  const headers = ['Fecha', 'Equipo', 'Participante', 'Rol', 'Ciclo', 'Tamaño Equipo', 'Tiempo Scrum',
    'Score Total %', 'Nivel', ...DIMS.map(d => d.label)];
  const rows = [headers];
  [...responses]
    .sort((a, b) => (a.fields.Fecha || '').localeCompare(b.fields.Fecha || ''))
    .forEach(r => {
      const team = teams.find(t => (r.fields.Equipo || []).includes(t.id));
      rows.push([
        r.fields.Fecha ? new Date(r.fields.Fecha).toLocaleDateString('es') : '',
        team ? team.name : '',
        r.fields.Participante || '',
        r.fields.Rol || '',
        r.fields.Ciclo || '',
        r.fields['Tamaño Equipo'] || '',
        r.fields['Tiempo Scrum'] || '',
        r.fields['Score Total %'] || 0,
        r.fields.Nivel || '',
        ...DIMS.map(d => r.fields[d.field] || 0)
      ]);
    });
  downloadCSV(`respuestas-assessment-${new Date().toISOString().slice(0,10)}.csv`, rows);
}

// ── Evolution ────────────────────────────────────────────────────
function getEvolutionData(tid, role) {
  const resps = responses.filter(r =>
    (r.fields.Equipo || []).includes(tid) &&
    (role === 'Todos' || r.fields.Rol === role)
  );
  const byCycle = {};
  resps.forEach(r => {
    const cn = r.fields.Ciclo || 'Sin ciclo';
    if (!byCycle[cn]) byCycle[cn] = [];
    byCycle[cn].push(r);
  });
  return Object.entries(byCycle).map(([cycleName, rs]) => {
    const dimSums = {};
    DIMS.forEach(d => { dimSums[d.key] = 0; });
    let totalPct = 0;
    rs.forEach(r => {
      DIMS.forEach(d => { dimSums[d.key] += r.fields[d.field] || 0; });
      totalPct += r.fields['Score Total %'] || 0;
    });
    const avgTotal = Math.round(totalPct / rs.length);
    const avgDims = {};
    DIMS.forEach(d => {
      const avg = dimSums[d.key] / rs.length;
      avgDims[d.key] = { pct: Math.round((avg / d.max) * 100) };
    });
    const qSums = {};
    let qCount = 0;
    rs.forEach(r => {
      if (r.fields.Answers && Object.keys(r.fields.Answers).length > 0) {
        qCount++;
        Object.entries(r.fields.Answers).forEach(([k, v]) => { qSums[k] = (qSums[k] || 0) + Number(v); });
      }
    });
    const avgQuestions = qCount > 0
      ? Object.fromEntries(Object.entries(qSums).map(([k, sum]) => [k, +(sum / qCount).toFixed(2)]))
      : null;
    return { cycleName, count: rs.length, avgTotal, avgDims, level: getLevel(avgTotal), avgQuestions };
  }).sort((a, b) => {
    const ia = cycles.findIndex(c => c.name === a.cycleName);
    const ib = cycles.findIndex(c => c.name === b.cycleName);
    if (ia !== -1 && ib !== -1) return ia - ib;
    if (ia !== -1) return -1;
    if (ib !== -1) return 1;
    return a.cycleName.localeCompare(b.cycleName);
  });
}

// ── API ──────────────────────────────────────────────────────────
async function fetchAllData() {
  loading = true; render();
  try {
    const tSnap = await db.collection('equipos').get();
    teams = tSnap.docs.map(d => ({ id: d.id, name: d.data().nombre, active: !!d.data().activo }))
      .sort((a, b) => a.name.localeCompare(b.name));

    const rSnap = await db.collection('respuestas').get();
    responses = rSnap.docs.map(d => {
      const r = d.data();
      return {
        id: d.id,
        fields: {
          Equipo: [r.equipoId],
          Participante: r.participante,
          Rol: r.rol,
          Ciclo: r.ciclo || '',
          ...Object.fromEntries(DIMS.map(d => [d.field, r[d.storeKey] || 0])),
          'Score Total %': r.scoreTotalPct || 0,
          Nivel: r.nivel || '',
          Fecha: r.fecha ? r.fecha.toDate().toISOString() : '',
          'Tamaño Equipo': r.tamanoEquipo || '',
          'Tiempo Scrum': r.tiempoScrum || '',
          Answers: r.answers || {}
        }
      };
    }).sort((a, b) => (b.fields.Fecha || '').localeCompare(a.fields.Fecha || ''));

    const cSnap = await db.collection('ciclos').get();
    cycles = cSnap.docs.map(d => ({ id: d.id, name: d.data().nombre, active: !!d.data().activo }))
      .sort((a, b) => a.name.localeCompare(b.name));

    await fetchPlans();
    computeStats();
  } catch(e) { toast('Error al conectar con Firebase'); }
  loading = false; render();
}

async function addTeam() {
  const name = newTeamName.trim();
  if (!name) return;
  try {
    await db.collection('equipos').add({ nombre: name, activo: true });
    newTeamName = '';
    toast(`Equipo "${name}" creado`);
    await fetchAllData();
  } catch(e) { toast('Error al crear equipo'); }
}

async function toggleActive(id, name, current) {
  try {
    await db.collection('equipos').doc(id).update({ activo: !current });
    toast(current ? `"${name}" desactivado` : `"${name}" activado`);
    await fetchAllData();
  } catch(e) { toast('Error de conexión'); }
}

async function deleteTeam(id, name) {
  if (!confirm(`¿Eliminar "${name}"? Esta acción no se puede deshacer.`)) return;
  try {
    await db.collection('equipos').doc(id).delete();
    toast(`Equipo "${name}" eliminado`);
    await fetchAllData();
  } catch(e) { toast('Error de conexión'); }
}

// ── Toast ────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');

}

      ).join('')}

  // Madurez por rol card
  const roleOrgStats = [...new Set(filtByCycle.map(r => r.fields.Rol).filter(Boolean))].sort().map(role => {
    const rr = filtByCycle.filter(r => r.fields.Rol === role);
    const avg = Math.round(rr.reduce((sum, r) => sum + (r.fields['Score Total %'] || 0), 0) / rr.length);

  }).sort((a, b) => b.avg - a.avg);

  const roleCard = roleOrgStats.length > 1 ? `

        </div>`).join('')}

  // Org role filter pills
  const orgRolePills = ['Todos', ...availOrgRoles].map(r => `
    <button class="role-pill ${r === orgRoleFilter ? 'active' : ''}" onclick="orgRoleFilter='${r}';render()">${r}</button>`
  ).join('');

  const comparison = `
    <div class="section-card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;">

              ${patternBlock}
              ${recs}
            </div>

      }).join('')}
    </div>`;

  return stats + exportRow + cyclePills + roleCard + comparison + cards;
}

function renderEvolution() {

  const withData = Object.values(teamStats).filter(s => s.count > 0);
  if (!withData.length) return `<div class="empty-state">Aún no hay respuestas para mostrar evolución.</div>`;

  const rolePills = ['Todos', 'Product Owner', 'Dev Team', 'Scrum Master'].map(r => `
    <button class="role-pill ${r === evolRole ? 'active' : ''}" onclick="evolRole='${r}';render()">${r}</button>`
  ).join('');

  const selectors = `
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;">
      <select class="field-input" style="max-width:220px;" onchange="evolTeamId=this.value;render()">

      </div>`;
  }

  const data = getEvolutionData(evolTeamId, evolRole);
  const teamName = withData.find(s => s.id === evolTeamId)?.name || '';

  if (!data.length) {
    return `
      <div class="section-card">

        ${selectors}
        <div style="color:var(--ink-faint);font-size:13px;padding:8px 0;">No hay datos para esta combinación.</div>
      </div>`;
  }

  const delta = (curr, prev) => {
    const d = curr - prev;
    if (d > 0) return `<span class="delta-up"> ▲ +${d}%</span>`;
    if (d < 0) return `<span class="delta-dn"> ▼ ${d}%</span>`;
    return `<span class="delta-eq"> → 0%</span>`;
  };

  const timeline = `
    <div class="evo-timeline">
      ${data.map((d, i) => {
        const prev = i > 0 ? data[i - 1] : null;
        return `
          <div class="evo-cycle-card" style="background:${d.level.bg};">
            <div class="evo-cycle-name" style="color:${d.level.color};">${d.cycleName}</div>
            <div class="evo-cycle-score" style="color:${d.level.color};">${d.avgTotal}%${prev ? delta(d.avgTotal, prev.avgTotal) : ''}</div>
            <div class="evo-cycle-meta" style="color:${d.level.color};">${d.level.label} · ${d.count} resp.</div>
          </div>`;
      }).join('')}
    </div>`;

  const dimTable = `
    <div style="overflow-x:auto;">
      <table class="evo-table">
        <thead>
          <tr>
            <th class="evo-th">Dimensión</th>
            ${data.map(d => `<th class="evo-th-c">${d.cycleName}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${DIMS.map(dim => `
            <tr>
              <td class="evo-td-dim">
                <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${dim.color};margin-right:6px;vertical-align:middle;"></span>${dim.label}
              </td>
              ${data.map((d, i) => {
                const pct = d.avgDims[dim.key].pct;
                const prev = i > 0 ? data[i - 1].avgDims[dim.key].pct : null;
                return `<td class="evo-td">
                  <div class="evo-bar-wrap"><div class="evo-bar" style="width:${pct}%;background:${dim.color};"></div></div>
                  <div style="font-weight:600;color:var(--ink);">${pct}%${prev !== null ? delta(pct, prev) : ''}</div>
                </td>`;
              }).join('')}
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  const latest = data[data.length - 1];
  const prevCycle = data.length > 1 ? data[data.length - 2] : null;
  const evolTeamResps = responses.filter(r => (r.fields.Equipo || []).includes(evolTeamId));
  const roleForRec = evolRole === 'Todos' ? getMajorityRole(evolTeamResps) : evolRole;

  const dimScores = DIMS.map(d => ({
    ...d, pct: latest.avgDims[d.key].pct,
    prevPct: prevCycle ? prevCycle.avgDims[d.key].pct : null
  }));
  const evolBelow80 = [...dimScores]
    .filter(d => d.pct < 80 || (d.prevPct !== null && d.pct < d.prevPct))
    .sort((a, b) => {
      const aR = a.prevPct !== null && a.pct < a.prevPct;
      const bR = b.prevPct !== null && b.pct < b.prevPct;
      if (aR && !bR) return -1;
      if (!aR && bR) return 1;
      return a.pct - b.pct;
    });
  const toFix = evolBelow80.length > 0
    ? evolBelow80
    : [...dimScores].sort((a, b) => a.pct - b.pct).slice(0, 4);

  const recs = toFix.length
    ? toFix.map(d => {
        const regressed = d.prevPct !== null && d.pct < d.prevPct;
        const improved  = d.prevPct !== null && d.pct > d.prevPct && d.pct < 60;
        const delta     = d.prevPct !== null ? Math.abs(d.pct - d.prevPct) : 0;
        const itemClass = regressed ? 'rec-item rec-item--urgent' : improved ? 'rec-item rec-item--improving' : 'rec-item';
        let trendBadge = '';
        if (regressed) trendBadge = `<div class="rec-trend" style="color:var(--red);">▼ Retroceso −${delta}% vs. ciclo anterior</div>`;
        else if (improved) trendBadge = `<div class="rec-trend" style="color:#0d7a52;">▲ Mejora +${delta}% vs. ciclo anterior — mantener el foco</div>`;
        return `<div class="${itemClass}">
          <div class="rec-dot" style="background:${d.color};flex-shrink:0;margin-top:${regressed||improved?'14px':'5px'}"></div>
          <div class="rec-text">
            ${trendBadge}
            <strong>${d.label}:</strong> ${getRec(d.key, d.pct, roleForRec)}
          </div>
        </div>`;
      }).join('')
    : `<div class="rec-item">
         <div class="rec-dot" style="background:#0d7a52"></div>
         <div class="rec-text">Excelente progreso en todas las dimensiones. Mantener el ritmo de mejora continua.</div>
       </div>`;

  // Detalle por pregunta (ciclo anterior → último ciclo)
  let qDetailCard = '';
  if (data.length > 1 && latest.avgQuestions && prevCycle && prevCycle.avgQuestions) {
    const qRows = SECTIONS.flatMap(sec =>
      sec.questions.map((q, qi) => {
        const key = sec.id + '_' + qi;
        const latestPct = Math.round((latest.avgQuestions[key] || 0) / 3 * 100);
        const prevPct   = Math.round((prevCycle.avgQuestions[key] || 0) / 3 * 100);
        return { key, text: q.text, secId: sec.id, latestPct, prevPct, delta: latestPct - prevPct };
      })
    );
    const dimSections = DIMS.map(d => {
      const qs = qRows.filter(q => q.secId === d.key);
      if (!qs.length) return '';
      return `
        <div style="margin-bottom:20px;">
          <div style="font-size:11px;font-weight:600;color:${d.color};text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">
            <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${d.color};margin-right:6px;vertical-align:middle;"></span>${d.label}
          </div>
          ${qs.map((q, i) => `
            <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);">
              <div style="font-size:11px;font-weight:600;color:var(--ink-faint);width:22px;flex-shrink:0;">P${i+1}</div>
              <div style="flex:1;font-size:12px;color:var(--ink-muted);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${q.text}">${q.text.length > 72 ? q.text.slice(0,72)+'…' : q.text}</div>
              <div style="font-size:12px;font-weight:600;color:var(--ink);flex-shrink:0;min-width:36px;text-align:right;">${q.latestPct}%</div>
              <div style="flex-shrink:0;min-width:54px;text-align:right;">
                ${q.delta > 0 ? `<span class="delta-up">▲ +${q.delta}%</span>`
                : q.delta < 0 ? `<span class="delta-dn">▼ ${q.delta}%</span>`
                : `<span class="delta-eq">→ 0%</span>`}
              </div>
            </div>`).join('')}
        </div>`;
    }).join('');
    qDetailCard = `
      <div class="section-card" style="margin-top:0;">
        <div class="section-title">Detalle por pregunta · ${prevCycle.cycleName} → ${latest.cycleName}</div>
        <p style="font-size:12px;color:var(--ink-faint);margin-bottom:16px;line-height:1.5;">Puntaje promedio de cada pregunta en el último ciclo y variación respecto al anterior.</p>
        ${dimSections}
      </div>`;
  }

  return `
    <div class="section-card">
      <div class="section-title">Evolución · ${teamName}${evolRole !== 'Todos' ? ' · ' + evolRole : ''}</div>
      ${selectors}
      ${data.length === 1 ? `<p style="font-size:13px;color:var(--amber);background:var(--amber-light);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:16px;">Solo hay un ciclo con datos. La comparación aparecerá cuando haya más de un ciclo completado.</p>` : ''}
      ${timeline}
      ${data.length > 1 ? dimTable : ''}
      <div class="recs-section" style="margin-top:16px;">
        <div class="recs-label">Recomendaciones · ${data[data.length-1].cycleName}${evolRole !== 'Todos' ? ' · ' + evolRole : ''}</div>
        ${recs}
      </div>
    </div>
    ${qDetailCard}`;
}

// ── Teams tab ─────────────────────────────────────────────────────
function renderTeams() {
  const cyclesSection = `
    <div class="section-card">
      <div class="section-title">Gestión de ciclos</div>
      <div class="add-row" style="margin-bottom:16px;">
        <div class="field-group" style="flex:1;margin-bottom:0;">
          <label>Nombre del ciclo</label>
          <input class="field-input" type="text" placeholder="Ej. Q1 2026"
            value="${newCycleName}" oninput="newCycleName=this.value"
            onkeydown="if(event.key==='Enter')addCycle()"/>
        </div>
        <button class="btn primary" onclick="addCycle()" style="flex-shrink:0;margin-bottom:1px;">Crear</button>
      </div>
      ${cycles.length === 0
        ? `<div style="font-size:13px;color:var(--ink-faint);padding:8px 0;">No hay ciclos creados aún.</div>`
        : `<div class="team-list">
            ${cycles.map(c => {
              const esc = c.name.replace(/'/g, "\\'");
              return `<div class="cycle-row">
                <div class="cycle-row-name">${c.name}</div>
                <span class="${c.active ? 'badge-active' : 'badge-inactive'}">${c.active ? 'Activo' : 'Cerrado'}</span>
                <div style="display:flex;gap:6px;">
                  <button class="btn sm" onclick="toggleCycle('${c.id}','${esc}',${c.active})">
                    ${c.active ? 'Cerrar' : 'Activar'}
                  </button>
                  <button class="btn sm danger" onclick="deleteCycle('${c.id}','${esc}')">✕</button>
                </div>
              </div>`;
            }).join('')}
          </div>`}
      <p style="font-size:12px;color:var(--ink-faint);margin-top:12px;line-height:1.5;">Solo un ciclo puede estar activo a la vez. Las nuevas respuestas del assessment se asignan automáticamente al ciclo activo.</p>
    </div>`;

  const addForm = `
    <div class="section-card">
      <div class="section-title">Agregar equipo</div>
      <div class="add-row">
        <div class="field-group">
          <label>Nombre del equipo</label>
          <input class="field-input" type="text" placeholder="Ej. Equipo Phoenix"
            value="${newTeamName}" oninput="newTeamName=this.value"
            onkeydown="if(event.key==='Enter')addTeam()"/>
        </div>
        <button class="btn primary" onclick="addTeam()" style="flex-shrink:0;margin-bottom:1px;">Agregar</button>
      </div>
    </div>`;

  const list = loading
    ? `<div class="empty-state">Cargando equipos…</div>`
    : teams.length === 0
      ? `<div class="empty-state">No hay equipos aún. Agrega el primero.</div>`
      : `<div class="team-list">
          ${teams.map(t => {
            const count = teamStats[t.id] ? teamStats[t.id].count : 0;
            const esc   = t.name.replace(/'/g, "\\'");
            return `<div class="team-row">
              <div class="team-row-name">${t.name}</div>
              <span class="team-count-badge">${count} respuesta${count !== 1 ? 's' : ''}</span>
              <span class="${t.active ? 'badge-on' : 'badge-off'}">${t.active ? 'Activo' : 'Inactivo'}</span>
              <div style="display:flex;gap:6px;">
                <button class="btn sm" onclick="showQR('${t.id}','${esc}')">QR</button>
                <button class="btn sm" onclick="toggleActive('${t.id}','${esc}',${t.active})">
                  ${t.active ? 'Desactivar' : 'Activar'}
                </button>
                <button class="btn sm danger" onclick="deleteTeam('${t.id}','${esc}')">✕</button>
              </div>
            </div>`;
          }).join('')}
        </div>`;

  return cyclesSection + addForm + `
    <div class="section-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="section-title" style="margin-bottom:0;">Equipos registrados</div>
        <a href="https://console.firebase.google.com/project/agile-assessment-5a117/firestore" target="_blank" class="btn sm">Ver en Firebase ↗</a>
      </div>
      ${list}
    </div>`;
}

// ── QR Code ──────────────────────────────────────────────────────
function showQR(teamId, teamName) {
  const url = window.location.origin + '/?teamId=' + teamId;
  const modal = document.getElementById('qr-modal');
  modal.style.display = 'flex';
  modal.innerHTML = `
    <div style="background:white;border-radius:var(--radius);padding:28px;max-width:380px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.2);" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div style="font-size:16px;font-weight:600;color:var(--ink);">Compartir assessment</div>
        <button onclick="closeQR()" style="background:none;border:none;font-size:20px;line-height:1;cursor:pointer;color:var(--ink-faint);padding:0 2px;">✕</button>
      </div>
      <div style="font-size:13px;color:var(--ink-muted);margin-bottom:20px;">Comparte este QR con el equipo <strong>${teamName}</strong> para que accedan al assessment con el equipo pre-seleccionado.</div>
      <div id="qr-canvas" style="display:flex;justify-content:center;margin-bottom:20px;"></div>
      <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:11px;color:var(--ink-muted);word-break:break-all;margin-bottom:16px;">${url}</div>
      <div style="display:flex;gap:8px;">
        <button class="btn primary" onclick="copyQRUrl('${url}')" style="flex:1;">Copiar link</button>
        <button class="btn" onclick="closeQR()">Cerrar</button>
      </div>
    </div>`;
  modal.onclick = e => { if (e.target === modal) closeQR(); };
  if (typeof QRCode !== 'undefined') {
    new QRCode(document.getElementById('qr-canvas'), {
      text: url, width: 180, height: 180,
      colorDark: '#0f1117', colorLight: '#ffffff'
    });
  } else {
    document.getElementById('qr-canvas').innerHTML =
      `<div style="font-size:12px;color:var(--ink-faint);text-align:center;padding:16px;">Copia el link de arriba para compartir.</div>`;
  }
}

function closeQR() {
  const modal = document.getElementById('qr-modal');
  modal.style.display = 'none';
  modal.innerHTML = '';
}

function copyQRUrl(url) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => toast('Link copiado'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('Link copiado');
  }
}

// ── Plan de Acción ───────────────────────────────────────────────
async function fetchPlans() {
  try {
    const snap = await db.collection('planes').get();
    plans = snap.docs.map(d => ({
      id: d.id, ...d.data(),
      _ms: d.data().fechaCreacion ? d.data().fechaCreacion.toMillis() : 0
    })).sort((a, b) => b._ms - a._ms);
  } catch(e) { plans = []; }
}

async function addPlan() {
  if (!newPlanTeamId || !newPlanIniciativa.trim()) return;
  const team = teams.find(t => t.id === newPlanTeamId);
  const cicloFinal = newPlanCiclo || (cycles.find(c => c.active) || {}).name || '';
  try {
    await db.collection('planes').add({
      equipoId: newPlanTeamId,
      equipoNombre: team ? team.name : '',
      iniciativa: newPlanIniciativa.trim(),
      responsable: newPlanResponsable.trim(),
      fechaObjetivo: newPlanFecha,
      estado: 'pendiente',
      ciclo: cicloFinal,
      fechaCreacion: firebase.firestore.FieldValue.serverTimestamp()
    });
    newPlanIniciativa = ''; newPlanResponsable = ''; newPlanFecha = '';
    toast('Acción agregada');
    await fetchPlans();
    render();
  } catch(e) { toast('Error al guardar'); }
}

async function updatePlanStatus(id, status) {
  try {
    await db.collection('planes').doc(id).update({ estado: status });
    await fetchPlans();
    render();
  } catch(e) { toast('Error de conexión'); }
}

async function deletePlan(id) {
  if (!confirm('¿Eliminar esta acción?')) return;
  try {
    await db.collection('planes').doc(id).delete();
    toast('Acción eliminada');
    await fetchPlans();
    render();
  } catch(e) { toast('Error de conexión'); }
}

function renderPlan() {
  if (loading) return `<div class="empty-state">Cargando datos…</div>`;

  const STATE = {
    'pendiente': { label:'Pendiente', color:'#a05c0a', bg:'#fdefd6' },
    'en-curso':  { label:'En curso',  color:'#1a4fd6', bg:'#dce6ff' },
    'completado':{ label:'Completado',color:'#0d7a52', bg:'#d4f0e5' }
  };

  const activeTeams = teams.filter(t => t.active);
  const availCycles = cycles.map(c => c.name);

  const filtered = plans
    .filter(p => planTeamFilter === 'Todos' || p.equipoNombre === planTeamFilter)
    .filter(p => planCycleFilter === 'Todos' || p.ciclo === planCycleFilter);

  const counts = { pendiente:0, 'en-curso':0, completado:0 };
  filtered.forEach(p => { if (counts[p.estado] !== undefined) counts[p.estado]++; });

  // Filters
  const teamNames = [...new Set(plans.map(p => p.equipoNombre).filter(Boolean))].sort();
  const teamPills = teamNames.length > 1 ? `
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
      <span style="font-size:11px;font-weight:600;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0;">Equipo</span>
      ${['Todos', ...teamNames].map(n => `<button class="role-pill ${n===planTeamFilter?'active':''}" onclick="planTeamFilter='${n.replace(/'/g,"\\'")}';render()">${n}</button>`).join('')}
    </div>` : '';

  const cyclePills = availCycles.length ? `
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
      <span style="font-size:11px;font-weight:600;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0;">Ciclo</span>
      ${['Todos', ...availCycles].map(c => `<button class="role-pill ${c===planCycleFilter?'active':''}" onclick="planCycleFilter='${c.replace(/'/g,"\\'")}';render()">${c}</button>`).join('')}
    </div>` : '';

  // Add form
  const addForm = `
    <div class="section-card">
      <div class="section-title">Nueva acción de mejora</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <div class="field-group" style="margin-bottom:0;">
          <label>Equipo</label>
          <select class="field-input" onchange="newPlanTeamId=this.value">
            <option value="">— Seleccionar equipo —</option>
            ${activeTeams.map(t => `<option value="${t.id}" ${newPlanTeamId===t.id?'selected':''}>${t.name}</option>`).join('')}
          </select>
        </div>
        <div class="field-group" style="margin-bottom:0;">
          <label>Ciclo</label>
          <select class="field-input" onchange="newPlanCiclo=this.value">
            <option value="">— Ciclo activo —</option>
            ${cycles.map(c => `<option value="${c.name}" ${newPlanCiclo===c.name?'selected':''}>${c.name}${c.active?' (activo)':''}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field-group">
        <label>Iniciativa / Acción</label>
        <input class="field-input" type="text" placeholder="Ej. Definir Definition of Done con el equipo"
          value="${newPlanIniciativa.replace(/"/g,'&quot;')}" oninput="newPlanIniciativa=this.value"
          onkeydown="if(event.key==='Enter')addPlan()"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
        <div class="field-group" style="margin-bottom:0;">
          <label>Responsable</label>
          <input class="field-input" type="text" placeholder="Ej. Scrum Master"
            value="${newPlanResponsable.replace(/"/g,'&quot;')}" oninput="newPlanResponsable=this.value"/>
        </div>
        <div class="field-group" style="margin-bottom:0;">
          <label>Fecha objetivo</label>
          <input class="field-input" type="date" value="${newPlanFecha}" oninput="newPlanFecha=this.value"/>
        </div>
      </div>
      <button class="btn primary" onclick="addPlan()" ${(!newPlanTeamId||!newPlanIniciativa.trim())?'disabled':''}>+ Agregar acción</button>
    </div>`;

  // Stats
  const statsRow = `
    <div class="stats-row" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px;">
      ${Object.entries(STATE).map(([k,v]) => `
        <div class="stat-card">
          <div class="stat-num" style="color:${v.color}">${counts[k]}</div>
          <div class="stat-label">${v.label}</div>
        </div>`).join('')}
    </div>`;

  // List
  const list = filtered.length === 0
    ? `<div class="empty-state" style="padding:24px 0;">No hay acciones para los filtros seleccionados.</div>`
    : `<div style="display:flex;flex-direction:column;gap:10px;">
        ${filtered.map(p => {
          const sc = STATE[p.estado] || STATE['pendiente'];
          const otherStates = Object.entries(STATE).filter(([k]) => k !== p.estado);
          return `
            <div style="background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
                <div style="flex:1;min-width:0;">
                  <div style="font-size:14px;font-weight:500;color:var(--ink);margin-bottom:6px;">${p.iniciativa}</div>
                  <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
                    ${p.equipoNombre ? `<span style="font-size:11px;font-weight:500;color:var(--ink-muted);">${p.equipoNombre}</span>` : ''}
                    ${p.responsable ? `<span style="font-size:11px;color:var(--ink-faint);">· ${p.responsable}</span>` : ''}
                    ${p.ciclo ? `<span style="font-size:11px;color:var(--ink-faint);background:var(--surface-2);border:1px solid var(--border);padding:1px 7px;border-radius:99px;">${p.ciclo}</span>` : ''}
                    ${p.fechaObjetivo ? `<span style="font-size:11px;color:var(--ink-faint);">Fecha: ${p.fechaObjetivo}</span>` : ''}
                  </div>
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
                  <span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;background:${sc.bg};color:${sc.color};">${sc.label}</span>
                  <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;">
                    ${otherStates.map(([k,v]) => `<button class="btn sm" onclick="updatePlanStatus('${p.id}','${k}')" style="padding:3px 8px;font-size:11px;">${v.label}</button>`).join('')}
                    <button class="btn sm danger" onclick="deletePlan('${p.id}')" style="padding:3px 8px;font-size:11px;">✕</button>
                  </div>
                </div>
              </div>
            </div>`;
        }).join('')}
      </div>`;

  return addForm + `
    <div class="section-card">
      <div class="section-title">Acciones en seguimiento</div>
      <div class="no-print">${teamPills}${cyclePills}</div>
      ${statsRow}
      ${list}
    </div>`;
}

// ── Init ─────────────────────────────────────────────────────────
render();
if (authenticated) fetchAllData();
</script>
</body>
