<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Assessment Agile</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f1117; --ink-muted: #5a5f72; --ink-faint: #9198aa;
    --surface: #fafaf8; --surface-2: #f2f1ed; --surface-3: #e8e7e1;
    --accent: #1a4fd6; --accent-light: #dce6ff; --accent-dark: #0f35a0;
    --green: #0d7a52; --green-light: #d4f0e5;
    --amber: #a05c0a; --amber-light: #fdefd6;
    --red: #c0282a; --red-light: #fce8e8;
    --purple: #7c3aed; --purple-light: #ede9fe;
    --border: #dddbd4; --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--ink); min-height: 100vh; font-size: 16px; line-height: 1.6; }
  .shell { max-width: 860px; margin: 0 auto; padding: 0 20px 80px; }

  .header { padding: 48px 0 32px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
  .header-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
  .header h1 { font-family: 'DM Serif Display', serif; font-size: clamp(24px, 4vw, 36px); line-height: 1.1; margin-bottom: 8px; }
  .header p { font-size: 15px; color: var(--ink-muted); }

  /* Tabs */
  .tab-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; border-bottom: 2px solid var(--border); }
  .tabs { display: flex; gap: 4px; }
  .tab { padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--ink-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-actions { display: flex; gap: 8px; padding-bottom: 8px; }

  /* Login */
  .login-card { background: white; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 32px; max-width: 360px; }
  .login-card h2 { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 6px; }
  .login-card p { font-size: 14px; color: var(--ink-muted); margin-bottom: 24px; }
  .login-error { font-size: 13px; color: var(--red); margin-top: 8px; }

  /* Form */
  .field-group { margin-bottom: 16px; }
  .field-group label { font-size: 14px; font-weight: 500; color: var(--ink); display: block; margin-bottom: 6px; }
  .field-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: 'DM Sans', sans-serif; background: white; color: var(--ink); outline: none; transition: border-color 0.15s; }
  .field-input:focus { border-color: var(--accent); }

  /* Buttons */
  .btn { padding: 11px 22px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: white; color: var(--ink); font-family: 'DM Sans', sans-serif; transition: all 0.15s; text-decoration: none; display: inline-block; }
  .btn:hover { background: var(--surface-2); border-color: var(--ink-faint); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
  .btn.sm { padding: 6px 14px; font-size: 12px; }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: var(--red-light); }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  @media(max-width:600px){ .stats-row { grid-template-columns: 1fr 1fr; } }
  .stat-card { background: white; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 16px 18px; }
  .stat-num { font-size: 28px; font-weight: 600; color: var(--ink); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--ink-faint); }

  /* Section */
  .section-card { background: white; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
  .section-title { font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 16px; }

  /* Comparativo */
  .org-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .org-row:last-child { border-bottom: none; }
  .org-name { width: 170px; font-size: 13px; font-weight: 500; color: var(--ink); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .org-bar-wrap { flex: 1; height: 8px; background: var(--surface-2); border-radius: 99px; overflow: hidden; }
  .org-bar { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .org-pct { font-size: 13px; font-weight: 600; color: var(--ink); width: 42px; text-align: right; flex-shrink: 0; }
  .org-badge { font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 99px; flex-shrink: 0; }

  /* Team cards */
  .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:600px){ .team-grid { grid-template-columns: 1fr; } }
  .tac { background: white; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .tac-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
  .tac-name { font-size: 15px; font-weight: 600; color: var(--ink); }
  .tac-meta { font-size: 12px; color: var(--ink-faint); margin-top: 2px; }
  .tac-score { text-align: right; flex-shrink: 0; margin-left: 12px; }
  .tac-score-num { font-size: 26px; font-weight: 600; line-height: 1; }
  .tac-level { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; margin-top: 4px; display: inline-block; }
  .dim-row { margin-bottom: 10px; }
  .dim-row-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .dim-label { font-size: 12px; color: var(--ink-muted); }
  .dim-pct-label { font-size: 12px; font-weight: 600; color: var(--ink); }
  .dim-bar-wrap { height: 4px; background: var(--surface-2); border-radius: 99px; overflow: hidden; }
  .dim-bar { height: 100%; border-radius: 99px; }
  .recs-section { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
  .recs-label { font-size: 11px; font-weight: 600; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .rec-item { display: flex; gap: 8px; margin-bottom: 7px; }
  .rec-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .rec-text { font-size: 12px; color: var(--ink-muted); line-height: 1.5; }

  /* Role filter */
  .role-filter { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--border); }
  .role-pill { padding:3px 10px; font-size:11px; font-weight:600; border-radius:99px; cursor:pointer; border:1.5px solid var(--border); background:white; color:var(--ink-muted); font-family:'DM Sans',sans-serif; transition:all 0.15s; }
  .role-pill:hover { border-color:var(--ink-faint); color:var(--ink); }
  .role-pill.active { background:var(--accent-light); border-color:var(--accent); color:var(--accent-dark); }

  /* Teams mgmt */
  .add-row { display: flex; gap: 10px; align-items: flex-end; }
  .add-row .field-group { flex: 1; margin-bottom: 0; }
  .team-list { display: flex; flex-direction: column; gap: 10px; }
  .team-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); }
  .team-row-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--ink); }
  .team-count-badge { font-size: 12px; color: var(--ink-faint); background: var(--surface-2); border: 1px solid var(--border); padding: 2px 10px; border-radius: 99px; }
  .badge-on  { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px; background: var(--green-light); color: var(--green); }
  .badge-off { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px; background: var(--surface-3); color: var(--ink-faint); }

  .empty-state { text-align: center; padding: 48px 0; color: var(--ink-faint); font-size: 14px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: white; font-size: 13px; padding: 10px 18px; border-radius: var(--radius-sm); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
  .fade-in { animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* Evolution */
  .evo-timeline { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; margin-bottom:20px; }
  .evo-cycle-card { flex:1; min-width:110px; border-radius:var(--radius-sm); padding:12px 14px; }
  .evo-cycle-name { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; }
  .evo-cycle-score { font-size:22px; font-weight:600; line-height:1; }
  .evo-cycle-meta { font-size:11px; margin-top:2px; }
  .evo-table { width:100%; border-collapse:collapse; font-size:12px; }
  .evo-th { text-align:left; padding:8px 10px 8px 0; color:var(--ink-faint); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; border-bottom:1.5px solid var(--border); }
  .evo-th-c { padding:8px 10px; color:var(--ink-muted); font-weight:600; font-size:11px; text-align:center; border-bottom:1.5px solid var(--border); white-space:nowrap; }
  .evo-td-dim { padding:10px 10px 10px 0; color:var(--ink); font-weight:500; border-bottom:1px solid var(--border); white-space:nowrap; }
  .evo-td { padding:8px 10px; text-align:center; border-bottom:1px solid var(--border); vertical-align:middle; }
  .evo-bar-wrap { height:4px; background:var(--surface-2); border-radius:99px; overflow:hidden; width:72px; margin:0 auto 4px; }
  .evo-bar { height:100%; border-radius:99px; }
  .delta-up { color:var(--green); font-size:11px; font-weight:600; }
  .delta-dn { color:var(--red); font-size:11px; font-weight:600; }
  .delta-eq { color:var(--ink-faint); font-size:11px; }
  .no-print {}

  /* Cycles management */
  .cycle-row { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius-sm); }
  .cycle-row-name { flex:1; font-size:14px; font-weight:500; color:var(--ink); }
  .badge-active { font-size:11px; font-weight:600; padding:3px 10px; border-radius:99px; background:var(--green-light); color:var(--green); }
  .badge-inactive { font-size:11px; font-weight:600; padding:3px 10px; border-radius:99px; background:var(--surface-3); color:var(--ink-faint); }

  /* Print */
  @media print {
    .tab-bar, .toast, .no-print, .role-filter { display:none !important; }
    .btn { display:none !important; }
    .shell { max-width:100%; padding:0 16px; }
    .team-grid { grid-template-columns:1fr 1fr; }
    .section-card, .tac { break-inside:avoid; page-break-inside:avoid; }
    body { background:white; font-size:11px; }
    .stat-num { font-size:20px !important; }
    .header { padding:20px 0 16px; }
  }
</style>
</head>

      "Hay visibilidad parcial. Trabaja en que los impedimentos sean visibles antes de que escalen: crea un registro de impedimentos visible y da seguimiento a su resolución — esto genera confianza en el proceso.",

    ]
  }
};

function getRec(dim, pct, role) {
  const idx = pct <= 33 ? 0 : pct <= 66 ? 1 : 2;
  if (role && RECS_ROLE[role] && RECS_ROLE[role][dim]) return RECS_ROLE[role][dim][idx];
  return RECS[dim][idx];
}

// ── Helpers ──────────────────────────────────────────────────────

function getLevel(pct) { return LEVELS.find(l => pct <= l.max) || LEVELS[LEVELS.length - 1]; }

function getTeamFilteredStats(tid, roleFilter, cFilter) {
  const cf = cFilter || 'Todos';
  const filtered = responses.filter(r =>
    (r.fields.Equipo || []).includes(tid) &&
    (roleFilter === 'Todos' || r.fields.Rol === roleFilter) &&
    (cf === 'Todos' || r.fields.Ciclo === cf)
  );
  if (!filtered.length) return null;
  const dimSums = {};
  DIMS.forEach(d => { dimSums[d.key] = 0; });
  let totalPct = 0;
  filtered.forEach(r => {
    DIMS.forEach(d => { dimSums[d.key] += r.fields[d.field] || 0; });
    totalPct += r.fields['Score Total %'] || 0;
  });
  const avgTotal = Math.round(totalPct / filtered.length);
  const avgDims = {};
  DIMS.forEach(d => {
    const avg = dimSums[d.key] / filtered.length;
    avgDims[d.key] = { score: +avg.toFixed(1), pct: Math.round((avg / d.max) * 100) };
  });
  return { count: filtered.length, avgTotal, avgDims, level: getLevel(avgTotal) };
}

function computeStats() {
  const stats = {};
  teams.forEach(t => {
    stats[t.id] = { id: t.id, name: t.name, active: t.active, count: 0, dimSums: {}, totalPct: 0 };
    DIMS.forEach(d => { stats[t.id].dimSums[d.key] = 0; });
  });

  responses.forEach(r => {
    (r.fields.Equipo || []).forEach(tid => {
      if (!stats[tid]) return;
      const s = stats[tid];
      s.count++;
      DIMS.forEach(d => { s.dimSums[d.key] += r.fields[d.field] || 0; });
      s.totalPct += r.fields['Score Total %'] || 0;
    });
  });

  Object.values(stats).forEach(s => {
    if (s.count > 0) {
      s.avgTotal = Math.round(s.totalPct / s.count);
      s.avgDims = {};
      DIMS.forEach(d => {
        const avg = s.dimSums[d.key] / s.count;
        s.avgDims[d.key] = { score: +avg.toFixed(1), pct: Math.round((avg / d.max) * 100) };
      });
      s.level = getLevel(s.avgTotal);
    }
  });
  teamStats = stats;
}

// ── Export ───────────────────────────────────────────────────────
function downloadCSV(filename, rows) {
  const csv = 'sep=;\r\n' + '\uFEFF' + rows.map(r =>
    r.map(cell => '"' + String(cell == null ? '' : cell).replace(/"/g, '""') + '"').join(';')
  ).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function exportSummary() {
  const headers = ['Equipo', 'Ciclo', 'Rol', 'Respuestas', 'Score Total %', 'Nivel',
    ...DIMS.map(d => d.label + ' %')];
  const rows = [headers];
  Object.values(teamStats).filter(s => s.count > 0).forEach(s => {
    const ds = getTeamFilteredStats(s.id, orgRoleFilter, cycleFilter);
    if (!ds) return;
    rows.push([s.name, cycleFilter === 'Todos' ? 'Todos' : cycleFilter,
      orgRoleFilter, ds.count, ds.avgTotal, ds.level.label,
      ...DIMS.map(d => ds.avgDims[d.key].pct)]);
  });
  downloadCSV(`resumen-assessment-${new Date().toISOString().slice(0,10)}.csv`, rows);
}

function exportRaw() {
  const headers = ['Fecha', 'Equipo', 'Participante', 'Rol', 'Ciclo',
    'Score Total %', 'Nivel', ...DIMS.map(d => d.label)];
  const rows = [headers];
  [...responses]
    .sort((a, b) => (a.fields.Fecha || '').localeCompare(b.fields.Fecha || ''))
    .forEach(r => {
      const team = teams.find(t => (r.fields.Equipo || []).includes(t.id));
      rows.push([
        r.fields.Fecha ? new Date(r.fields.Fecha).toLocaleDateString('es') : '',
        team ? team.name : '',
        r.fields.Participante || '',
        r.fields.Rol || '',
        r.fields.Ciclo || '',
        r.fields['Score Total %'] || 0,
        r.fields.Nivel || '',
        ...DIMS.map(d => r.fields[d.field] || 0)
      ]);
    });
  downloadCSV(`respuestas-assessment-${new Date().toISOString().slice(0,10)}.csv`, rows);
}

// ── Evolution ────────────────────────────────────────────────────
function getEvolutionData(tid, role) {
  const resps = responses.filter(r =>
    (r.fields.Equipo || []).includes(tid) &&
    (role === 'Todos' || r.fields.Rol === role)
  );
  const byCycle = {};
  resps.forEach(r => {
    const cn = r.fields.Ciclo || 'Sin ciclo';
    if (!byCycle[cn]) byCycle[cn] = [];
    byCycle[cn].push(r);
  });
  return Object.entries(byCycle).map(([cycleName, rs]) => {
    const dimSums = {};
    DIMS.forEach(d => { dimSums[d.key] = 0; });
    let totalPct = 0;
    rs.forEach(r => {
      DIMS.forEach(d => { dimSums[d.key] += r.fields[d.field] || 0; });
      totalPct += r.fields['Score Total %'] || 0;
    });
    const avgTotal = Math.round(totalPct / rs.length);
    const avgDims = {};
    DIMS.forEach(d => {
      const avg = dimSums[d.key] / rs.length;
      avgDims[d.key] = { pct: Math.round((avg / d.max) * 100) };
    });
    return { cycleName, count: rs.length, avgTotal, avgDims, level: getLevel(avgTotal) };
  }).sort((a, b) => {
    const ia = cycles.findIndex(c => c.name === a.cycleName);
    const ib = cycles.findIndex(c => c.name === b.cycleName);
    if (ia !== -1 && ib !== -1) return ia - ib;
    if (ia !== -1) return -1;
    if (ib !== -1) return 1;
    return a.cycleName.localeCompare(b.cycleName);
  });
}

// ── API ──────────────────────────────────────────────────────────
async function fetchAllData() {
  loading = true; render();
  try {
    const tSnap = await db.collection('equipos').get();
    teams = tSnap.docs.map(d => ({ id: d.id, name: d.data().nombre, active: !!d.data().activo }))
      .sort((a, b) => a.name.localeCompare(b.name));

    const rSnap = await db.collection('respuestas').get();
    responses = rSnap.docs.map(d => {
      const r = d.data();
      return {
        id: d.id,
        fields: {
          Equipo: [r.equipoId],
          Participante: r.participante,
          Rol: r.rol,
          Ciclo: r.ciclo || '',
          'Score Eventos': r.scoreEventos || 0,
          'Score Backlog': r.scoreBacklog || 0,
          'Score Dev Team': r.scoreDevTeam || 0,
          'Score Transparencia': r.scoreTransparencia || 0,
          'Score Total %': r.scoreTotalPct || 0,
          Nivel: r.nivel || '',
          Fecha: r.fecha ? r.fecha.toDate().toISOString() : ''
        }
      };
    }).sort((a, b) => (b.fields.Fecha || '').localeCompare(a.fields.Fecha || ''));

    const cSnap = await db.collection('ciclos').get();
    cycles = cSnap.docs.map(d => ({ id: d.id, name: d.data().nombre, active: !!d.data().activo }))
      .sort((a, b) => a.name.localeCompare(b.name));

    computeStats();
  } catch(e) { toast('Error al conectar con Firebase'); }
  loading = false; render();
}

      <select class="field-input" style="max-width:220px;" onchange="evolTeamId=this.value;render()">
        <option value="">— Seleccionar equipo —</option>
        ${withData.map(s => `<option value="${s.id}" ${s.id === evolTeamId ? 'selected' : ''}>${s.name}</option>`).join('')}
      </select>
      ${rolePills}
    </div>`;

  if (!evolTeamId) {
    return `
      <div class="section-card">
        <div class="section-title">Evolución por equipo</div>
        ${selectors}
        <div style="color:var(--ink-faint);font-size:13px;padding:8px 0;">Selecciona un equipo para ver su evolución entre ciclos.</div>
      </div>`;
  }

  const data = getEvolutionData(evolTeamId, evolRole);
  const teamName = withData.find(s => s.id === evolTeamId)?.name || '';

  if (!data.length) {
    return `
      <div class="section-card">
        <div class="section-title">Evolución · ${teamName}</div>
        ${selectors}
        <div style="color:var(--ink-faint);font-size:13px;padding:8px 0;">No hay datos para esta combinación.</div>
      </div>`;
  }

  const delta = (curr, prev) => {
    const d = curr - prev;
    if (d > 0) return `<span class="delta-up"> ▲ +${d}%</span>`;
    if (d < 0) return `<span class="delta-dn"> ▼ ${d}%</span>`;
    return `<span class="delta-eq"> → 0%</span>`;
  };

  const timeline = `
    <div class="evo-timeline">
      ${data.map((d, i) => {
        const prev = i > 0 ? data[i - 1] : null;
        return `
          <div class="evo-cycle-card" style="background:${d.level.bg};">
            <div class="evo-cycle-name" style="color:${d.level.color};">${d.cycleName}</div>
            <div class="evo-cycle-score" style="color:${d.level.color};">${d.avgTotal}%${prev ? delta(d.avgTotal, prev.avgTotal) : ''}</div>
            <div class="evo-cycle-meta" style="color:${d.level.color};">${d.level.label} · ${d.count} resp.</div>
          </div>`;
      }).join('')}
    </div>`;

  const dimTable = `
    <div style="overflow-x:auto;">
      <table class="evo-table">
        <thead>
          <tr>
            <th class="evo-th">Dimensión</th>
            ${data.map(d => `<th class="evo-th-c">${d.cycleName}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${DIMS.map(dim => `
            <tr>
              <td class="evo-td-dim">
                <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${dim.color};margin-right:6px;vertical-align:middle;"></span>${dim.label}
              </td>
              ${data.map((d, i) => {
                const pct = d.avgDims[dim.key].pct;
                const prev = i > 0 ? data[i - 1].avgDims[dim.key].pct : null;
                return `<td class="evo-td">
                  <div class="evo-bar-wrap"><div class="evo-bar" style="width:${pct}%;background:${dim.color};"></div></div>
                  <div style="font-weight:600;color:var(--ink);">${pct}%${prev !== null ? delta(pct, prev) : ''}</div>
                </td>`;
              }).join('')}
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  const latest = data[data.length - 1];
  const prevCycle = data.length > 1 ? data[data.length - 2] : null;
  const roleForRec = evolRole === 'Todos' ? null : evolRole;

  const dimScores = DIMS.map(d => ({
    ...d, pct: latest.avgDims[d.key].pct,
    prevPct: prevCycle ? prevCycle.avgDims[d.key].pct : null
  }));
  const toFix = [...dimScores]
    .filter(d => d.pct < 70 || (d.prevPct !== null && d.pct < d.prevPct))
    .sort((a, b) => {
      const aR = a.prevPct !== null && a.pct < a.prevPct;
      const bR = b.prevPct !== null && b.pct < b.prevPct;
      if (aR && !bR) return -1;
      if (!aR && bR) return 1;
      return a.pct - b.pct;
    }).slice(0, 3);

  const recs = toFix.length
    ? toFix.map(d => {
        const regressed = d.prevPct !== null && d.pct < d.prevPct;
        return `<div class="rec-item">
          <div class="rec-dot" style="background:${d.color}"></div>
          <div class="rec-text">
            ${regressed ? `<span style="color:var(--red);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;">Retroceso · </span>` : ''}
            <strong>${d.label}:</strong> ${getRec(d.key, d.pct, roleForRec)}
          </div>
        </div>`;
      }).join('')
    : `<div class="rec-item">
         <div class="rec-dot" style="background:#0d7a52"></div>
         <div class="rec-text">Excelente progreso en todas las dimensiones. Mantener el ritmo de mejora continua.</div>
       </div>`;

  return `
    <div class="section-card">
      <div class="section-title">Evolución · ${teamName}${evolRole !== 'Todos' ? ' · ' + evolRole : ''}</div>
      ${selectors}
      ${data.length === 1 ? `<p style="font-size:13px;color:var(--amber);background:var(--amber-light);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:16px;">Solo hay un ciclo con datos. La comparación aparecerá cuando haya más de un ciclo completado.</p>` : ''}
      ${timeline}
      ${data.length > 1 ? dimTable : ''}
      <div class="recs-section" style="margin-top:16px;">
        <div class="recs-label">Recomendaciones · ${data[data.length-1].cycleName}${evolRole !== 'Todos' ? ' · ' + evolRole : ''}</div>
        ${recs}
      </div>
    </div>`;
}

// ── Teams tab ─────────────────────────────────────────────────────
function renderTeams() {
  const cyclesSection = `
    <div class="section-card">
      <div class="section-title">Gestión de ciclos</div>
      <div class="add-row" style="margin-bottom:16px;">
        <div class="field-group" style="flex:1;margin-bottom:0;">
          <label>Nombre del ciclo</label>
          <input class="field-input" type="text" placeholder="Ej. Q1 2026"
            value="${newCycleName}" oninput="newCycleName=this.value"
            onkeydown="if(event.key==='Enter')addCycle()"/>
        </div>
        <button class="btn primary" onclick="addCycle()" style="flex-shrink:0;margin-bottom:1px;">Crear</button>
      </div>
      ${cycles.length === 0
        ? `<div style="font-size:13px;color:var(--ink-faint);padding:8px 0;">No hay ciclos creados aún.</div>`
        : `<div class="team-list">
            ${cycles.map(c => {
              const esc = c.name.replace(/'/g, "\\'");
              return `<div class="cycle-row">
                <div class="cycle-row-name">${c.name}</div>
                <span class="${c.active ? 'badge-active' : 'badge-inactive'}">${c.active ? 'Activo' : 'Cerrado'}</span>
                <div style="display:flex;gap:6px;">
                  <button class="btn sm" onclick="toggleCycle('${c.id}','${esc}',${c.active})">
                    ${c.active ? 'Cerrar' : 'Activar'}
                  </button>
                  <button class="btn sm danger" onclick="deleteCycle('${c.id}','${esc}')">✕</button>
                </div>
              </div>`;
            }).join('')}
          </div>`}
      <p style="font-size:12px;color:var(--ink-faint);margin-top:12px;line-height:1.5;">Solo un ciclo puede estar activo a la vez. Las nuevas respuestas del assessment se asignan automáticamente al ciclo activo.</p>
    </div>`;

  const addForm = `
    <div class="section-card">
      <div class="section-title">Agregar equipo</div>
      <div class="add-row">
        <div class="field-group">
          <label>Nombre del equipo</label>
          <input class="field-input" type="text" placeholder="Ej. Equipo Phoenix"
            value="${newTeamName}" oninput="newTeamName=this.value"
            onkeydown="if(event.key==='Enter')addTeam()"/>
        </div>
        <button class="btn primary" onclick="addTeam()" style="flex-shrink:0;margin-bottom:1px;">Agregar</button>
      </div>
    </div>`;

  const list = loading
    ? `<div class="empty-state">Cargando equipos…</div>`
    : teams.length === 0
      ? `<div class="empty-state">No hay equipos aún. Agrega el primero.</div>`
      : `<div class="team-list">
          ${teams.map(t => {
            const count = teamStats[t.id] ? teamStats[t.id].count : 0;
            const esc   = t.name.replace(/'/g, "\\'");
            return `<div class="team-row">
              <div class="team-row-name">${t.name}</div>
              <span class="team-count-badge">${count} respuesta${count !== 1 ? 's' : ''}</span>
              <span class="${t.active ? 'badge-on' : 'badge-off'}">${t.active ? 'Activo' : 'Inactivo'}</span>
              <div style="display:flex;gap:6px;">
                <button class="btn sm" onclick="toggleActive('${t.id}','${esc}',${t.active})">
                  ${t.active ? 'Desactivar' : 'Activar'}
                </button>
                <button class="btn sm danger" onclick="deleteTeam('${t.id}','${esc}')">✕</button>
              </div>
            </div>`;
          }).join('')}
        </div>`;

  return cyclesSection + addForm + `
    <div class="section-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="section-title" style="margin-bottom:0;">Equipos registrados</div>
        <a href="https://console.firebase.google.com/project/agile-assessment-5a117/firestore" target="_blank" class="btn sm">Ver en Firebase ↗</a>
      </div>
      ${list}
    </div>`;
}

// ── Init ─────────────────────────────────────────────────────────
render();
if (authenticated) fetchAllData();
</script>
</body>
</html>
